<!DOCTYPE html>
<html>

<head>
    <title>Add Expense | Smart Expense Analyzer</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            background: #111827;
            padding: 40px;
            border-radius: 16px;
            width: 380px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #1f2937;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        .footer {
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>➕ Add Expense</h2>

        <form method="post">
            {% csrf_token %}

            <!-- render Django form but styled inputs -->
            {% for field in form %}
            <label style="display:block; margin-bottom:4px; color:#cbd5e1;">
                {{ field.label }}
            </label>

            {{ field }}

            {% if field.errors %}
            <div style="color:#f87171; font-size:12px; margin-bottom:8px;">
                {{ field.errors }}
            </div>
            {% endif %}
            {% endfor %}

            <button type="submit">Save Expense</button>
        </form>

        <div class="footer">
            <a href="/dashboard/">← Back to Dashboard</a>
        </div>
    </div>

</body>

</html>
