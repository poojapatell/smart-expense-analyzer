<!DOCTYPE html>
<html>

<head>
    <title>Dashboard | Smart Expense Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 30px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 14px;
            color: #cbd5e1;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
        }

        h1 {
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: #111827;
            padding: 20px;
            border-radius: 16px;
            flex: 1;
            min-width: 280px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .highlight {
            font-size: 32px;
            font-weight: bold;
            margin-top: 10px;
        }

        .ai-box {
            background: #0b1220;
            border: 1px solid #1f2937;
        }

        .upload-box {
            background: #111827;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="file"] {
            color: white;
        }

        button {
            padding: 10px 14px;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        canvas {
            width: 100% !important;
            height: 260px !important;
        }

        ul {
            padding-left: 18px;
        }

        li {
            color: #cbd5e1;
            margin-bottom: 5px;
        }

        .add-btn {
            display: inline-block;
            margin-bottom: 15px;
            padding: 10px 14px;
            background: #22c55e;
            color: white;
            border-radius: 8px;
        }

        .add-btn:hover {
            background: #16a34a;
        }

        .muted {
            color: #94a3b8;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="topbar">
            <div>👤 {{ request.user.username }}</div>
            <div><a href="/accounts/logout/">Logout</a></div>
        </div>

        <h1>💰 Smart Expense Dashboard</h1>

        <!-- TOP CARDS -->
        <div class="row">
            <div class="card">
                <h3>Total Spend</h3>
                <div class="highlight">₹{{ total_spend }}</div>
            </div>

            <div class="card ai-box">
                <h3>🤖 AI Insight</h3>
                <p class="muted">{{ ai_insight.summary }}</p>
            </div>
        </div>

        <a class="add-btn" href="/add/">+ Add Expense</a>

        <!-- UPLOAD -->
        <div class="upload-box">
            <input type="file" id="csvFile" accept=".csv">
            <button onclick="uploadCSV()">Upload CSV</button>
            <span id="uploadStatus" class="muted"></span>
        </div>

        <!-- AI DETAILS -->
        <div class="card" style="margin-bottom:20px;">
            <h3>Insights</h3>
            <p><b>⚠️</b> {{ ai_insight.anomaly }}</p>

            <ul>
                {% for tip in ai_insight.advice %}
                <li>{{ tip }}</li>
                {% endfor %}
            </ul>
        </div>

        <!-- CHARTS -->
        <div class="row">
            <div class="card">
                <h3>Category Breakdown</h3>
                <canvas id="categoryChart"></canvas>
            </div>

            <div class="card">
                <h3>Monthly Trend</h3>
                <canvas id="trendChart"></canvas>
            </div>
        </div>

    </div>
    <script>
        const categoryData = JSON.parse('{{ category_json|escapejs }}');
        const trendData = JSON.parse('{{ trend_json|escapejs }}');

        const catLabels = categoryData.map(x => x.category__name || "Others");
        const catValues = categoryData.map(x => x.total);

        new Chart(document.getElementById('categoryChart'), {
            type: 'doughnut',
            data: {
                labels: catLabels,
                datasets: [{
                    data: catValues
                }]
            }
        });

        const trendLabels = trendData.map(x => x.month);
        const trendValues = trendData.map(x => x.total);

        new Chart(document.getElementById('trendChart'), {
            type: 'line',
            data: {
                labels: trendLabels,
                datasets: [{
                    label: 'Monthly Spend',
                    data: trendValues
                }]
            }
        });

    </script>
    <script>
        function uploadCSV() {
            const fileInput = document.getElementById("csvFile");
            const file = fileInput.files[0];

            if (!file) {
                alert("Please select a file");
                return;
            }

            const formData = new FormData();
            formData.append("file", file);

            document.getElementById("uploadStatus").innerText = "Uploading...";

            fetch("/upload/", {
                method: "POST",
                body: formData,
                credentials: "same-origin"
            })
                .then(res => res.json())
                .then(data => {
                    document.getElementById("uploadStatus").innerText =
                        `Inserted: ${data.rows_inserted}`;

                    // 🔥 refresh dashboard data
                    refreshDashboard();
                })
                .catch(err => {
                    document.getElementById("uploadStatus").innerText =
                        "Upload failed";
                    console.error(err);
                });
        }
    </script>
    <script>
        function refreshDashboard() {
            fetch("/dashboard-data/")   // we will create this API
                .then(res => res.json())
                .then(data => {

                    // update charts
                    updateCharts(data);

                });
        }
    </script>

</body>

</html>
